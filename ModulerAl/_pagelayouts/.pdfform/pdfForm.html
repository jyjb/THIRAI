<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Form + PDF Overlay</title>
    <link rel="stylesheet" href="../../_styles/index.css">
    <link rel="stylesheet" href="pdfForm.css">
    <script src="../../_scripts/initator.js"></script>
    <script src="../../_scripts/loader.js"></script>
    <script src="../../_scripts/generics.js"></script>
    <script src="../../_scripts/sandbox.js"></script>

</head>

<body>

    <section id="pdf-formpage" class="formpagelayout">
        <div class="top">
            <div class="tabs" id="tabs"></div>
            <div class="controls">
                <label class="small">Coords:</label>
                <select id="coordOrigin" title="Coordinate origin">
                    <option value="top-left">Top-left</option>
                    <option value="pdf">PDF bottom-left</option>
                </select>
                <label class="small">PDF:</label>
                <!-- change sample.pdf to your file if needed -->
                <input id="pdfFile" type="file" accept="application/pdf" />
            </div>
        </div>

        <div class="main">
            <div class="left">
                <h3 id="formTitle">Select a tab</h3>
                <div id="formBody"></div>
            </div>

            <div class="right">
                <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
                    <button id="prevPage">Prev</button>
                    <button id="nextPage">Next</button>
                    <div style="flex:1"></div>
                    <span id="pageInfo" class="small"></span>
                </div>

                <div class="pdfWrapper" id="pdfWrapper">
                    <progress id="progress" value="0" max="100"></progress>
                    <iframe id="pdfViewer" width="100%" height="600" style="border:1px solid #ff0000;"></iframe>
                    <div id="overlay"></div>
                </div>
            </div>
        </div>
    </section>
    <!-- <script src="pdfForm.js"></script>-->
</body>

</html>
