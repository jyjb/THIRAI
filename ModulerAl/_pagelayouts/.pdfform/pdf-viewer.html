<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>PDF Viewer</title>
</head>

<body style="margin:0; height:100vh;">
    <iframe id="inner" style="width:100%; height:100%; border:none;">
    </iframe>

    <script>
        const params = new URLSearchParams(window.location.search);
        const blobUrl = params.get("src");
        document.getElementById("inner").src = blobUrl;
    </script>
</body>

</html>
