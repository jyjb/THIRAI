<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPI ShowCase 360</title>
    <link rel="stylesheet" href="../../_styles/index.css">
    <link rel="stylesheet" href="admin.css">
    <script src="/_scripts/initator.js"></script>
    <script src="/_scripts/loader.js"></script>
    <script src="/_scripts/generics.js"></script>
    <script src="/_scripts/sandbox.js"></script>

</head>

<body>
    <container class="jsLayout">
        <header id="page-head" class="pages">
            <h1 id='pageTitle'>Admin</h1>
        </header>
        <content id="page-body" class="content-Body pages">
            <section id="dynamic-content-controls" class="main-controls">
                <div class="controls-left">
                </div>
                <div class="controls-right">
                    <button class="btn-style back-btn btnSize"
                        onclick=" location.href = '../../index.html'">home</button>
                    <button class="btn-style btnSize" onclick="setAppPageData()">Save Data</button>
                    <button class="btn-style btnSize" onclick="toggleJSONLView()">View JSONL Source</button>
                </div>
            </section>
            <section id="dynamic-content-body" class="main-content">
                <div id="main-tab-page-content" class="tabbed-page">
                    <div id="tab-controls-container" class="tab-controls hidden"> </div>
                    <div id="tab-content-container" class="tab-content">
                        <div id="tab-left-container" class="left-container">
                            <div id="tab-left-search-container" class="left-search">
                                <input id="search-cards-below" class="searchbar" type="text"
                                    title="Please enter the search terms here..." placeholder="Search..."
                                    onkeyup="filterList()">
                            </div>
                            <div id="tab-left-content-container" class="left-content">
                                <a> NOTHING TO DISPLAY </a>
                            </div>
                            <div id="tab-left-controls-container" class="left-controls hidden">

                            </div>
                        </div>
                        <div id="tab-right-container" class="right-container">
                            <div id="tab-right-tab-container" class="right-tab">
                                <span id="current-id-display" style="font-weight:bold; color: var(--logo-blue);">No
                                    Selection</span>
                            </div>
                            <div id="tab-right-content-container" class="right-content">
                                <div id="formContainer" class="form-container"></div>
                            </div>
                            <div id="tab-right-controls-container" class="right-controls">
                                <button class="btn-style btnSize" onclick="saveCurrentForm()">Save Changes</button>
                                <button class="btn-style back-btn btnSize" onclick="deleteCurrentEntry()">Delete</button>
                            </div>
                        </div>
                    </div>
            </section>
        </content>
        <footer>
            <button id="appAdminOnly" class="btn-style btnSize btn-nostyle"
                onclick="location.href = '/_pagelayouts/.appadmin/admin.html'">
                <p>&copy; RRD BPI ShowCase 360 App | Built by BPI team, with HTML+VanilaJS+CSS Hosted
                    locally using custom server build on C#</p>
            </button>
        </footer>
        <div class="modal-overlay" id="jsonlModal">
            <div class="modal-box">
                <div class="modal-header">
                    <h3>Raw JSONL Output</h3>
                    <button class="btn-style btnSize" onclick="toggleJSONLView()">Close</button>
                </div>
                <textarea id="jsonlOutput" readonly></textarea>
            </div>
        </div>
    </container>
    <notification id="notification" class="notification hidden">
    </notification>
    <popup id="loading-spinner" class="spinner hidden">
        <div class="loader"></div>
        </div>
    </popup>
    <script src="admin.js"></script>
    <script src="..\..\_scripts\generics.js"></script>
</body>

</html>
