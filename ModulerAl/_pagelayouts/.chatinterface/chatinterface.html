<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPI ShowCase 360</title>
    <link rel="stylesheet" href="../../_styles/index.css">
    <link rel="stylesheet" href="chatinterface.css">
    <script src="/_scripts/initator.js"></script>
    <script src="/_scripts/loader.js"></script>
    <script src="/_scripts/generics.js"></script>
    <script src="/_scripts/sandbox.js"></script>

</head>

<body>



    <container class="jsLayout">
        <header id="page-head" class="page">
            <h1 id='pageTitle'></h1>
        </header>
        <content id="page-body" class="content-Body page">
            <section id="dynamic-content-controls" class="main-controls hidden">
                <div class="controls-left">
                </div>
                <div class="controls-right">

                </div>
            </section>
            <section id="dynamic-content-body" class="main-content">
                <div class="chat-wrapper form-container">
                    <div class="chat-header">Assistance Agent
                        <button id="toggle-history" class="toggle-history-btn">History ☰</button>
                    </div>

                    <div id="chat-window" class="chat-display">
                        <div class="chat-msg bot">Hi ! <br> How can I help?</div>
                    </div>

                    <div class="chat-controls">
                        <textarea id="text-input" class="searchbar chat-textarea"
                            placeholder="Type message..."></textarea>

                        <input type="file" id="file-input" class="hidden" multiple />

                        <button id="upload-btn" class="icon-btn btnSize boxShadow">📎</button>

                        <button id="send-btn" class="btn-style btnSize boxShadow">Send</button>
                    </div>

                    <div id="progress-text" class="chat-status smallerText"></div>
                </div>
                <aside id="sidebar" class="history-sidebar">
                    <div class="history-header">Chat History</div>
                    <div id="history-list" class="history-list">
                    </div>
                </aside>
            </section>
        </content>
        <footer>
            <button id="appAdminOnly" class="btn-style btnSize btn-nostyle"
                onclick="location.href = '/_pagelayouts/.appadmin/admin.html'">
                <p>&copy; RRD BPI ShowCase 360 App | Built by BPI team, with HTML+VanilaJS+CSS Hosted
                    locally using custom server build on C#</p>
            </button>
            </script>

        </footer>
    </container>
    <notification id="notification" class="notification hidden">
    </notification>
    <popup id="loading-spinner" class="spinner hidden">
        <div class="loader"></div>
        </div>
    </popup>
    <script src="chatinterface.js"></script>
</body>

</html>
