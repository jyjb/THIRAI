<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smart JSON → Form</title>
  <link rel="stylesheet" href="dynamicform.css" />
</head>
<body>

<h2>📦 Smart JSON → Schema → UI Config → Form</h2>

<div class="container">

  <div class="panel">
    <h3>1️⃣ Paste Your ACTUAL JSON (Data)</h3>
    <textarea id="jsonInput" placeholder="Paste your real JSON here..."></textarea>
    <button id="btnInfer">Infer Schema & UI Config</button>
  </div>

  <div class="panel">
    <h3>2️⃣ Inferred Schema (Editable)</h3>
    <textarea id="schemaOutput"></textarea>
    <button id="btnSaveSchema">Save Schema</button>
  </div>

  <div class="panel">
    <h3>3️⃣ Inferred UI Config (Editable)</h3>
    <textarea id="uiConfigOutput"></textarea>
    <button id="btnSaveUiConfig">Save UI Config</button>
  </div>

  <div class="panel">
    <h3>4️⃣ Render Final UI Form</h3>
    <button id="btnRenderForm">Generate UI Form</button>
  </div>

</div>

<hr/>

<h3>🎯 Generated Dynamic Form</h3>
<div id="app"></div>

<h3>📤 Final Output JSON</h3>
<pre id="output"></pre>

<script src="dynamicform.js"></script>
</body>
</html>
