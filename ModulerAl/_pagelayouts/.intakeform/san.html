<style>
  .stepper-horizontal { display: flex; justify-content: space-between; position: relative; width: 100%; font-family: 'Segoe UI', sans-serif; padding-top: 10px; }
  .stepper-horizontal::before { content: ''; position: absolute; top: 15px; left: 8%; width: 84%; height: 3px; background-color: #e0e0e0; z-index: 1; }
  .step-indicator { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; flex: 1; }
  .step-circle { width: 32px; height: 32px; border-radius: 50%; background-color: #e0e0e0; color: #666; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 8px; border: 3px solid #fff; }
  .step-title { font-size: 12px; color: #777; text-align: center; }
  .step-indicator.completed .step-circle { background-color: #107c41; color: white; }
  .step-indicator.completed .step-title { color: #107c41; font-weight: 600; }
  .step-indicator.active .step-circle { background-color: #0078d4; color: white; box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.2); }
  .step-indicator.active .step-title { color: #0078d4; font-weight: bold; }
</style>

<div id='intake-stepper' class='stepper-horizontal'>

  <div class='step-indicator " & If(varCurrentStep > 1, "completed", varCurrentStep = 1, "active", "") & "'>
    <div class='step-circle'>1</div><div class='step-title'>Context &amp; Scope</div>
  </div>

  <div class='step-indicator " & If(varCurrentStep > 2, "completed", varCurrentStep = 2, "active", "") & "'>
    <div class='step-circle'>2</div><div class='step-title'>Current State</div>
  </div>

  <div class='step-indicator " & If(varCurrentStep > 3, "completed", varCurrentStep = 3, "active", "") & "'>
    <div class='step-circle'>3</div><div class='step-title'>Integration</div>
  </div>

  <div class='step-indicator " & If(varCurrentStep > 4, "completed", varCurrentStep = 4, "active", "") & "'>
    <div class='step-circle'>4</div><div class='step-title'>Logic &amp; Rules</div>
  </div>

  <div class='step-indicator " & If(varCurrentStep > 5, "completed", varCurrentStep = 5, "active", "") & "'>
    <div class='step-circle'>5</div><div class='step-title'>Future State</div>
  </div>

  <div class='step-indicator " & If(varCurrentStep > 6, "completed", varCurrentStep = 6, "active", "") & "'>
    <div class='step-circle'>6</div><div class='step-title'>Success Criteria</div>
  </div>

</div>
