<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Intake Portal</title>
    <link rel="stylesheet" href="intake.css">

    <script src="../../_scripts/initator.js"></script>
    <script src="../../_scripts/loader.js"></script>
    <script src="../../_scripts/generics.js"></script>
    <script src="intake.js"></script>
</head>

<body>

    <div class="wizard-app">
        <header class="wizard-header">
            <h1>Automation Intake Portal</h1>
            <div id="intake-stepper" class="stepper-horizontal"></div>
        </header>

        <main class="wizard-body">
            <div class="layout-wrapper">

                <div class="form-column">
                    <form id="intakeForm"></form>
                </div>

                <div class="insights-column">
                    <div class="insights-card">
                        <div class="score-section">
                            <div id="feasibilityScore" class="score-circle">--</div>
                            <h3>Feasibility Score</h3>
                            <p id="feasibilityText">Awaiting inputs...</p>
                        </div>
                        <div class="insights-section">
                            <h4>Recommended Architecture</h4>
                            <div id="techTags" class="tag-list">
                                <span style="font-size: 0.8rem; color: var(--text-muted);">Provide details...</span>
                            </div>
                        </div>
                        <div class="insights-section">
                            <h4>Live Analysis</h4>
                            <ul id="suggestionsList" class="suggestions-list">
                                <li style="color: var(--text-muted); list-style: none;">Start filling the form...</li>
                            </ul>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <dialog id="serverLoadModal" class="wizard-modal">
            <div class="modal-header">
                <h3 style="margin: 0; color: var(--primary);">Saved Intake Forms</h3>
                <button class="close-btn" onclick="document.getElementById('serverLoadModal').close()">✖</button>
            </div>
            <div id="savedCardsContainer" class="modal-body">
            </div>
        </dialog>

        <footer class="wizard-footer">
            <div style="flex: 1;">
                <button type="button" id="prevBtn" class="btn-secondary" style="visibility: hidden;"
                    onclick="nextPrev(-1)">Back</button>
            </div>

            <div style="display: flex; gap: 15px; justify-content: center; flex: 1;">
                <button type="button" class="btn-secondary" onclick="openLoadModal()">Browse Saved Forms</button>
                <button type="button" class="btn-secondary" onclick="saveDataToServer()">Save to Server</button>
            </div>

            <div style="flex: 1; text-align: right;">
                <button type="button" id="nextBtn" class="btn-primary" onclick="nextPrev(1)">Continue</button>
            </div>
        </footer>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', initIntakeApp());
    </script>
</body>

</html>
