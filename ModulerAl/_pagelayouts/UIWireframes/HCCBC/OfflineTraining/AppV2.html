<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Training Management System</title>

<style>

:root{
    --cc-dark-red:#9C0101;
    --cc-red:#F40009;
    --maroon:#35141B;
    --pungent:#5E071A;
    --ruby:#750E25;
    --burgundy:#901B2B;
    --medium-ruby:#AD272E;
    --business-red:#991821;

    --black:#000000;
    --white:#FFFFFF;
    --soft-white:#FFFFF7;

    --shadow:
    0 10px 30px rgba(0,0,0,.15);

    --radius:20px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, sans-serif;
    background:#000;
    overflow:hidden;
}

.app{
    height:100vh;
    width:100%;
    display:flex;
}

/* SIDEBAR */

.sidebar{
    width:260px;
    background:linear-gradient(
        180deg,
        var(--maroon),
        var(--pungent),
        var(--ruby)
    );
    color:white;
    padding:20px;
    display:flex;
    flex-direction:column;
    transition:.3s;
}

.logo{
    font-size:22px;
    font-weight:bold;
    margin-bottom:25px;
}

.nav-item{
    padding:14px 18px;
    margin-bottom:8px;
    border-radius:14px;
    cursor:pointer;
    transition:.25s;
}

.nav-item:hover{
    background:rgba(255,255,255,.1);
}

.nav-item.active{
    background:var(--cc-red);
}

/* MAIN */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:15px;
    gap:15px;
    overflow:hidden;
}

.header{
    height:80px;
    background:rgba(255,255,255,.95);
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
    box-shadow:var(--shadow);
}

.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.header-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.menu-btn{
    display:none;
    font-size:24px;
    cursor:pointer;
}

.search{
    padding:12px;
    border-radius:12px;
    border:1px solid #ddd;
    width:260px;
}

.role{
    padding:10px 15px;
    background:var(--cc-red);
    color:white;
    border-radius:12px;
}

.content{
    flex:1;
    background:rgba(255,255,247,.98);
    border-radius:20px;
    padding:20px;
    overflow:auto;
}

.footer{
    height:60px;
    background:white;
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* DASHBOARD */

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:var(--shadow);
    border-left:6px solid var(--cc-red);
}

.card h2{
    color:var(--cc-red);
    margin-bottom:8px;
}

.grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:20px;
}

.large-card{
    background:white;
    height:280px;
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:20px;
}

/* FORMS */

.page-title{
    margin-bottom:20px;
    color:var(--business-red);
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

input,select,textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:12px;
}

.upload-grid{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.upload-card{
    background:white;
    border:2px dashed #ccc;
    border-radius:16px;
    padding:40px;
    text-align:center;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:16px;
    overflow:hidden;
}

th{
    background:var(--cc-red);
    color:white;
}

th,td{
    padding:15px;
    border-bottom:1px solid #eee;
    text-align:left;
}

/* WIZARD */

.steps{
    display:flex;
    gap:10px;
    margin-bottom:25px;
}

.step{
    width:45px;
    height:45px;
    border-radius:50%;
    background:#ddd;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
}

.step.active{
    background:var(--cc-red);
    color:white;
}

/* ADMIN */

.admin-grid{
    display:grid;
    grid-template-columns:250px 1fr;
    gap:20px;
}

.admin-menu{
    background:white;
    border-radius:20px;
    padding:20px;
}

.admin-menu div{
    padding:12px;
    cursor:pointer;
}

.admin-content{
    background:white;
    border-radius:20px;
    padding:20px;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
    position:fixed;
    left:-280px;
    top:0;
    height:100%;
    z-index:100;
}

.sidebar.show{
    left:0;
}

.menu-btn{
    display:block;
}

.stats{
    grid-template-columns:1fr;
}

.grid2{
    grid-template-columns:1fr;
}

.form-grid{
    grid-template-columns:1fr;
}

.upload-grid{
    grid-template-columns:1fr;
}

.admin-grid{
    grid-template-columns:1fr;
}

.search{
    width:130px;
}
}

</style>
</head>

<body>

<div class="app">

    <aside class="sidebar" id="sidebar">
        <div class="logo">
            CDL Training
        </div>

        <div id="menuContainer"></div>

    </aside>

    <div class="main">

        <div class="header">

            <div class="header-left">
                <div class="menu-btn" onclick="toggleSidebar()">☰</div>
                <h2>Driver Training Management</h2>
            </div>

            <div class="header-right">

                <input
                class="search"
                placeholder="Search..." />

                <select onchange="changeRole(this.value)">
                    <option>Admin</option>
                    <option selected>Trainer</option>
                    <option>Trainee</option>
                </select>

            </div>

        </div>

        <div class="content" id="content">

        </div>

        <div class="footer">
            © Driver Training Management System
        </div>

    </div>

</div>

<script>

const menuMatrix={
    Admin:[
        "Home",
        "Schedule & Assets",
        "Incidents",
        "Admin Settings",
        "Help",
        "Exit"
    ],
    Trainer:[
        "Home",
        "Register User",
        "View Trainees",
        "Schedule & Assets",
        "Incidents",
        "Help",
        "Exit"
    ],
    Trainee:[
        "Home",
        "Register User",
        "View Trainees",
        "Schedule & Assets",
        "Help",
        "Exit"
    ]
};

let currentRole="Trainer";

function renderMenu(){

    const container=
    document.getElementById("menuContainer");

    container.innerHTML="";

    menuMatrix[currentRole]
    .forEach((item,index)=>{

        container.innerHTML+=`
        <div
            class="nav-item ${index===0?'active':''}"
            onclick="loadPage('${item}')">

            ${item}

        </div>`;
    });

    loadPage("Home");
}

function changeRole(role){

    currentRole=role;

    renderMenu();

}

function loadPage(page){

if(page==="Home"){

document.getElementById("content").innerHTML=`

<h2 class="page-title">${currentRole} Dashboard</h2>

<div class="stats">

<div class="card">
<h2>52</h2>
<p>Assigned Trainees</p>
</div>

<div class="card">
<h2>8</h2>
<p>Pending Evaluations</p>
</div>

<div class="card">
<h2>14</h2>
<p>Upcoming Classes</p>
</div>

<div class="card">
<h2>4</h2>
<p>Incidents</p>
</div>

</div>

<div class="grid2">

<div class="large-card">
<h3>Training Progress</h3>
</div>

<div class="large-card">
<h3>Recent Activities</h3>
</div>

</div>

`;

}

else if(page==="Register User"){

document.getElementById("content").innerHTML=`

<h2 class="page-title">
Register User
</h2>

<div class="form-grid">

<input placeholder="Student Name">
<input placeholder="Location">

<input placeholder="Phone Number">
<input placeholder="Alternate Number">

<select>
<option>Traveling Student?</option>
<option>Yes</option>
<option>No</option>
</select>

</div>

<div class="upload-grid">

<div class="upload-card">
Driver License
</div>

<div class="upload-card">
Commercial Learners Permit
</div>

<div class="upload-card">
DOT Medical Certificate
</div>

</div>

`;

}

else if(page==="View Trainees"){

document.getElementById("content").innerHTML=`

<h2 class="page-title">
View Trainees
</h2>

<table>

<tr>
<th>Name</th>
<th>Location</th>
<th>Phone</th>
<th>Trainer</th>
<th>Actions</th>
</tr>

<tr>
<td>John Smith</td>
<td>Dallas</td>
<td>555-0023</td>
<td>Mike</td>
<td>✏️ 📊</td>
</tr>

<tr>
<td>Alex Ray</td>
<td>Houston</td>
<td>555-7890</td>
<td>Mike</td>
<td>✏️ 📊</td>
</tr>

</table>

`;

}

else if(page==="Admin Settings"){

document.getElementById("content").innerHTML=`

<h2 class="page-title">
Admin Settings
</h2>

<div class="admin-grid">

<div class="admin-menu">

<div>Programs</div>
<div>Questions</div>
<div>Assets</div>
<div>Locations</div>
<div>Users</div>
<div>Roles</div>

</div>

<div class="admin-content">

<h3>Program Management</h3>

<br>

<input placeholder="Program Name">

<br><br>

<input placeholder="Modules">

<br><br>

<button>
Save Program
</button>

</div>

</div>

`;

}

else if(page==="Schedule & Assets"){

document.getElementById("content").innerHTML=`

<h2 class="page-title">
Schedule & Assets
</h2>

<div class="steps">

<div class="step active">1</div>
<div class="step">2</div>
<div class="step">3</div>
<div class="step">4</div>
<div class="step">5</div>
<div class="step">6</div>

</div>

<div class="large-card">

<h3>Training Wizard</h3>

<br>

<ul>

<li>Student Details</li>
<li>Attendance</li>
<li>Guide Covered</li>
<li>Training Records</li>
<li>Tests</li>
<li>Evaluations</li>

</ul>

</div>

`;

}

else{

document.getElementById("content").innerHTML=`

<h2>${page}</h2>

<div class="large-card">
Wireframe Screen Placeholder
</div>

`;

}

}

function toggleSidebar(){

document
.getElementById("sidebar")
.classList
.toggle("show");

}

renderMenu();

</script>

</body>
</html>
