<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Training Management</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- Color Palette & Variables --- */
        :root {
            --coca-cola-dark-red: #9C0101;
            --coca-cola-red: #F40009;
            --casual-maroon: #35141B;
            --pungent-red: #5E071A;
            --dark-ruby: #750E25;
            --shiny-burgundy: #901B2B;
            --medium-ruby: #AD272E;
            --business-red: #991821;
            --black: #000000;
            --soft-white: #FFFFF7;
            --white: #FFFFFF;
            
            --border-light: #E2E8F0;
            --text-muted: #64748B;
            --bg-light: #F8FAFC;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
        }

        /* --- Base & Reset --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body, html { width: 100%; height: 100%; background-color: var(--black); color: #1E293B; overflow: hidden; }

        /* --- Architecture & Design Constraints --- */
        .app-background { 
            display: flex; 
            width: 100vw; /* 100% */
            height: 100vh; /* 100% */
            background: var(--black); 
            opacity: 1; 
        }

        /* Navbar: 10% of parent, 100% height, casual_maroon 90% opacity */
        .navbar {
            width: 10%;
            height: 100%;
            background: rgba(53, 20, 27, 0.9); 
            color: var(--white);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .nav-brand { 
            padding: 20px 10px; 
            font-size: 1rem; 
            font-weight: 700; 
            color: var(--soft-white); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            margin-bottom: 10px; 
            text-align: center; 
        }
        
        .nav-toggle { display: none; background: var(--coca-cola-red); color: var(--white); border: none; padding: 15px; cursor: pointer; font-weight: 600; font-size: 1rem; }
        
        .navbar ul { 
            list-style: none; 
            display: flex; 
            flex-direction: column; 
            width: 100%; 
            padding: 0 5px; 
            gap: 5px; 
        }
        
        .navbar a { 
            display: flex; 
            align-items: center; 
            padding: 10px; 
            color: #E2E8F0; 
            text-decoration: none; 
            font-size: 0.8rem; /* Adjusted for 10% width constraint */
            font-weight: 500; 
            border-radius: 6px; 
            transition: all 0.2s ease; 
        }
        .navbar a:hover { background: rgba(255,255,255,0.05); color: var(--white); }
        .navbar a.active { background: var(--shiny-burgundy); color: var(--white); box-shadow: var(--shadow-sm); border-left: 3px solid var(--coca-cola-red); }

        /* Main Container: 90% of parent */
        .main-container { width: 90%; height: 100%; display: flex; flex-direction: column; }

        /* Header: 90% conceptually (100% of main-container), 10% height, white 90% opacity */
        .header {
            width: 100%;
            height: 10%;
            background: rgba(255, 255, 255, 0.9);
            display: flex; align-items: center; justify-content: space-between; padding: 0 30px;
            border-bottom: 1px solid var(--border-light); z-index: 5;
        }
        .header h2 { font-weight: 600; color: var(--business-red); font-size: 1.4rem; margin: 0; }
        .user-profile { display: flex; align-items: center; gap: 15px; }
        .role-selector { background: var(--bg-light); border: 1px solid var(--border-light); padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; color: var(--casual-maroon); cursor: pointer; outline: none; }

        /* Body: 82% height, soft_white 90% opacity */
        .body-content {
            width: 100%;
            height: 82%;
            background: rgba(255, 255, 247, 0.9);
            padding: 30px; overflow-y: auto;
        }

        /* Footer: 8% height, white 90% opacity */
        .footer {
            width: 100%;
            height: 8%;
            background: rgba(255, 255, 255, 0.9);
            display: flex; align-items: center; justify-content: center; border-top: 1px solid var(--border-light); font-size: 0.8rem; color: var(--text-muted); font-weight: 500;
        }

        /* --- UI Components --- */
        .card { background: var(--white); border-radius: 10px; padding: 25px; box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.03); margin-bottom: 20px; }
        .card-header { margin-bottom: 20px; border-bottom: 1px solid var(--border-light); padding-bottom: 10px; }
        .card-header h3 { color: var(--casual-maroon); font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
        .card-header p { color: var(--text-muted); font-size: 0.85rem; }

        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .stat-card { background: var(--white); border-left: 4px solid var(--coca-cola-red); border-radius: 8px; padding: 20px; box-shadow: var(--shadow-sm); }
        .stat-card h4 { color: var(--text-muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--casual-maroon); }

        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; background: #E2E8F0; color: #475569; margin-right: 5px; }
        .badge.success { background: #DCFCE7; color: #166534; }
        .badge.warning { background: #FEF9C3; color: #854D0E; }
        .badge.danger { background: #FEE2E2; color: #991B1B; }
        .badge.info { background: #DBEAFE; color: #1E40AF; }

        /* Forms & Buttons */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.85rem; color: #334155; }
        .form-control { width: 100%; padding: 10px 14px; border: 1px solid var(--border-light); border-radius: 8px; font-size: 0.9rem; background: var(--bg-light); }
        .form-control:focus { outline: none; border-color: var(--medium-ruby); background: var(--white); box-shadow: 0 0 0 3px rgba(173, 39, 46, 0.1); }
        
        .btn { background: var(--shiny-burgundy); color: var(--white); border: none; padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: 500; font-size: 0.9rem; transition: all 0.2s ease; }
        .btn:hover { background: var(--coca-cola-dark-red); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border-light); color: #475569; }
        .btn-outline:hover { background: #F1F5F9; color: #0F172A; }

        .signature-pad { background: #E2E8F0; border: 2px dashed #94A3B8; height: 100px; display: flex; align-items: center; justify-content: center; color: #64748B; font-style: italic; border-radius: 8px; cursor: crosshair; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { color: var(--text-muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; padding: 12px 16px; border-bottom: 2px solid var(--border-light); }
        td { padding: 16px; border-bottom: 1px solid var(--border-light); font-size: 0.9rem; }
        tr:hover td { background: rgba(0,0,0,0.02); }

        /* Mobile-Second */
        @media (max-width: 768px) {
            .app-background { flex-direction: column; }
            .navbar { width: 100%; height: auto; box-shadow: none; }
            .nav-brand { display: none; }
            .nav-toggle { display: block; }
            .navbar ul { display: none; padding: 10px; }
            .navbar ul.show { display: block; }
            .main-container { width: 100%; height: 100%; flex-grow: 1; }
            .header { height: auto; padding: 15px 20px; flex-direction: column; align-items: flex-start; gap: 10px;}
            .body-content { height: auto; flex-grow: 1; padding: 15px; }
            .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-background">
    <!-- Left Navigation Bar -->
    <nav class="navbar">
        <div class="nav-brand" >
            <img src="image-removebg-preview (6).png">
        </div>
        <button class="nav-toggle" onclick="toggleMobileMenu()">☰ Menu</button>
        <ul id="navMenu">
            <!-- Dynamically populated by JS RBAC Engine -->
        </ul>
    </nav>

    <!-- Main Content Area -->
    <div class="main-container">
        <header class="header">
            <h2 id="header-title">Driver Training Program </h2>
            <div class="user-profile">
                <span style="font-size: 0.85rem; color: var(--text-muted);">Role:</span>
                <select class="role-selector" id="roleSelect" onchange="changeRole()">
                    <option value="Admin">Admin </option>
                    <option value="Trainer">Trainer </option>
                    <option value="Trainee">Trainee </option>
                </select>
            </div>
        </header>

        <main class="body-content" id="app-body"></main>

        <footer class="footer">
            <p>&copy; 2026 Training Management System | Designed PC-First</p>
        </footer>
    </div>
</div>

<script>
    // --- RBAC FRAMEWORK ENGINE ---
    const RBAC_MATRIX = {
        "menu_access": [
            { id: "home", label: "Home", roles: ["Admin", "Trainer", "Trainee"] },
            { id: "register", label: "Register User", roles: ["Trainer", "Trainee"] },
            { id: "trainees", label: "View Trainees", roles: ["Trainer", "Trainee"] },
            { id: "wizard", label: "Reports", roles: ["Trainer", "Trainee"] },
            { id: "admin", label: "Settings", roles: ["Admin"] },
            { id: "help", label: "Help", roles: ["Admin", "Trainer", "Trainee"] },
            { id: "exit", label: "Exit", roles: ["Admin", "Trainer", "Trainee"] }
        ]/*,
        "data_scopes": {
            "Admin": "Global Scope. Full access to all locations, modules, programs, users, and assets.",
            "Trainer": "Assigned Scope. Can only view and edit data for Trainees actively assigned to them.",
            "Trainee": "Self Scope. Can only view their own profile, scores, assigned schedules."
        }*/
    };

    let currentRole = 'Admin';
    let currentScreen = 'home';
    let currentWizardStep = 1;

    function toggleMobileMenu() { document.getElementById('navMenu').classList.toggle('show'); }

    // Renders the Navigation dynamically based on RBAC matrix
    function renderDynamicNav() {
        const navMenu = document.getElementById('navMenu');
        navMenu.innerHTML = ''; // Clear existing
        
        RBAC_MATRIX.menu_access.forEach(item => {
            if (item.roles.includes(currentRole)) {
                const li = document.createElement('li');
                li.innerHTML = `<a href="#" onclick="navigate('${item.id}')" id="nav-${item.id}">${item.label}</a>`;
                navMenu.appendChild(li);
            }
        });
    }

    function changeRole() {
        currentRole = document.getElementById('roleSelect').value;
        renderDynamicNav();
        
        // Safety check: if current screen is no longer allowed, boot to home
        const allowedScreens = RBAC_MATRIX.menu_access.filter(m => m.roles.includes(currentRole)).map(m => m.id);
        if(!allowedScreens.includes(currentScreen)) {
            navigate('home');
        } else {
            navigate(currentScreen);
        }
    }

    function navigate(screenId) {
        currentScreen = screenId;
        
        // Update active class
        document.querySelectorAll('.navbar a').forEach(a => a.classList.remove('active'));
        const activeLink = document.getElementById(`nav-${screenId}`);
        if(activeLink) activeLink.classList.add('active');

        const body = document.getElementById('app-body');
        const header = document.getElementById('header-title');

        switch(screenId) {
            case 'home': header.innerText = "Dashboard Overview"; renderHomeScreen(body); break;
            case 'register': header.innerText = "Register User"; renderRegisterScreen(body); break;
            case 'trainees': header.innerText = "View Trainees"; renderViewTraineesScreen(body); break;
            case 'wizard': header.innerText = "6 Modules Wizard"; currentWizardStep = 1; renderWizardScreen(body); break;
         
            case 'admin': header.innerText = "Settings"; renderAdminScreen(body); break;
            default: header.innerText = "System Info"; body.innerHTML = `<div class="card"><h3>Feature Available Soon</h3></div>`;
        }
        if(window.innerWidth <= 768) document.getElementById('navMenu').classList.remove('show');
    }

    // --- SCREEN RENDERERS (Respecting Data Scoping Rules) ---

    function renderHomeScreen(container) {
        const scopeBadge = `<span class="badge info" style="float:right;">Data Scope: ${RBAC_MATRIX.data_scopes[currentRole]}</span>`;
        let html = `<div style="margin-bottom:20px;">${scopeBadge}</div><div style="clear:both;"></div>`;

        if (currentRole === 'Admin') {
            html += `
                <div class="grid-4">
                    <div class="stat-card"><h4>System Overview</h4><div class="value">Nominal</div></div>
                    <div class="stat-card"><h4>Active Programs</h4><div class="value">4 Configured</div></div>
                    <div class="stat-card"><h4>Asset Readiness</h4><div class="value" style="color:#166534;">92% Online</div></div>
                    <div class="stat-card"><h4>Total User Count</h4><div class="value">312 Global</div></div>
                </div>
            `;
        } else if (currentRole === 'Trainer') {
            html += `
                <div class="grid-4">
                    <div class="stat-card"><h4>Assigned Trainees Progress</h4><div class="value">14 Active</div></div>
                    <div class="stat-card"><h4>Pending Evaluations</h4><div class="value">3 Awaiting</div></div>
                    <div class="stat-card"><h4>Upcoming Classes</h4><div class="value">2 Scheduled</div></div>
                    <div class="stat-card"><h4>Recent Incident Reports</h4><div class="value">0 Logged</div></div>
                </div>
            `;
        } else {
            html += `
                <div class="grid-4">
                    <div class="stat-card"><h4>Current Training Progress</h4><div class="value">Module 4/6</div></div>
                    <div class="stat-card"><h4>Upcoming Class Schedule</h4><div class="value">Today, 14:00</div></div>
                    <div class="stat-card"><h4>Recent Scores & Feedback</h4><div class="value">88% (Pass)</div></div>
                    <div class="stat-card"><h4>Attendance Summary</h4><div class="value" style="color:#166534;">Perfect</div></div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function renderRegisterScreen(container) {
        container.innerHTML = `
            <div class="card">
                <div class="card-header">
                    <h3>User Details & Forms</h3>
                    <p>New Driver Form, Traveling Form, and Student Details Form.</p>
                </div>
                <div class="grid-2">
                    <div>
                        <div class="form-group"><label>Student Full Name</label><input type="text" class="form-control"></div>
                        <div class="form-group"><label>Location</label><input type="text" class="form-control"></div>
                        <div class="form-group"><label>Phone Number</label><input type="text" class="form-control"></div>
                        <div class="form-group"><label>Alternate Phone</label><input type="text" class="form-control"></div>
                        <div class="form-group"><label>Is traveling student?</label><input type="checkbox"></div>
                    </div>
                    <div>
                        <div class="form-group"><label>Driver License Document</label><input type="file" class="form-control"></div>
                        <div class="form-group"><label>Commercial Learners Permit</label><input type="file" class="form-control"></div>
                        <div class="form-group"><label>DOT Medical Cert</label><input type="file" class="form-control"></div>
                    </div>
                </div>
                <hr style="margin:20px 0; border:0; border-top:1px solid var(--border-light);">
                <h4>Sign-on-Glass Workflow</h4>
                <div class="grid-2" style="margin-top:15px;">
                    <div class="signature-pad">Trainee Signature</div>
                    ${currentRole === 'Trainer' ? '<div class="signature-pad">Trainer Verification Signature</div>' : ''}
                </div>
                <div style="margin-top:20px;">
                    <button class="btn">Submit Documents</button>
                    ${currentRole === 'Trainer' ? '<button class="btn btn-outline" style="border-color:var(--coca-cola-red); color:var(--coca-cola-red);">Reject Missing/Invalid Docs</button>' : ''}
                </div>
            </div>
        `;
    }

    function renderViewTraineesScreen(container) {
        container.innerHTML = `
            <div class="card">
                <div class="card-header">
                    <h3>Trainee Directory</h3>
                    <p>${currentRole === 'Trainer' ? 'Viewing Trainees Assigned to You.' : 'Viewing Own Record.'}</p>
                </div>
                <table>
                    <tr><th>Name</th><th>Location</th><th>Phone Number</th><th>Trainer</th><th>Actions</th></tr>
                    <tr>
                        <td>John Doe</td><td>Chicago, IL</td><td>(555) 012-3456</td><td>Jane Smith</td>
                        <td>
                            ${currentRole === 'Trainer' ? `<button class="btn btn-outline" style="padding: 4px 8px; font-size:0.75rem;" onclick="navigate('wizard')">✏️ Edit 6 Modules</button>` : ''}
                            <button class="btn btn-outline" style="padding: 4px 8px; font-size:0.75rem;">📄 View Report</button>
                        </td>
                    </tr>
                </table>
            </div>
        `;
    }

    function renderScheduleScreen(container) {
        let adminControls = currentRole === 'Admin' ? `<button class="btn" style="float:right;">+ Manage Assets</button>` : '';
        
        container.innerHTML = `
            <div class="card">
                <div class="card-header">
                    ${adminControls}
                    <h3>Calendar Engine & Physical Bookings</h3>
                    <p>Handles complex physical booking matching Trainer + Trainee + Asset + Location Capacity.</p>
                </div>
                <div class="grid-4" style="background:var(--bg-light); padding:20px; border-radius:8px; border:1px solid var(--border-light);">
                    <div class="form-group" style="margin:0;"><label>Date</label><input type="date" class="form-control"></div>
                    <div class="form-group" style="margin:0;"><label>Location</label><select class="form-control"><option>Chicago Yard</option><option>Dallas Terminal</option></select></div>
                    <div class="form-group" style="margin:0;"><label>Required Asset Type</label><select class="form-control"><option>Tractor</option><option>Forklift</option></select></div>
                    <div class="form-group" style="margin:0;"><label>&nbsp;</label><button class="btn" style="width:100%;" onclick="alert('Checking capacity limits and Maintenance status...')">Check Availability</button></div>
                </div>
                
                <h4 style="margin-top:30px; margin-bottom:15px; color:var(--casual-maroon);">Asset Status Directory</h4>
                <table>
                    <tr><th>Asset ID</th><th>Type</th><th>Assigned Location</th><th>Status</th></tr>
                    <tr><td>TR-4012</td><td>Tractor</td><td>Chicago Yard</td><td><span class="badge success">Active</span></td></tr>
                    <tr><td>TR-4015</td><td>Tractor</td><td>Chicago Yard</td><td><span class="badge danger">In Maintenance</span> (Scheduling Prevented)</td></tr>
                </table>
            </div>
        `;
    }

    function renderIncidentScreen(container) {
        let adminView = currentRole === 'Admin' ? `<tr><td>07/08/2026</td><td>Dallas Terminal</td><td>TR-990</td><td>Mirror damaged during reversing.</td><td><span class="badge warning">Under Review</span></td></tr>` : '';
        
        container.innerHTML = `
            <div class="card">
                <div class="card-header"><h3>Incident Logging</h3><p>Immediate logging of safety breaches or asset damage during physical training.</p></div>
                <div class="grid-3">
                    <div class="form-group"><label>Date & Time</label><input type="datetime-local" class="form-control"></div>
                    <div class="form-group"><label>Location/Terminal</label><select class="form-control"><option>Chicago Yard</option></select></div>
                    <div class="form-group"><label>Asset ID Involved</label><input type="text" class="form-control" placeholder="e.g. TR-4015"></div>
                </div>
                <div class="form-group"><label>Involved Trainee & Trainer</label><input type="text" class="form-control" value="${currentRole === 'Trainer' ? 'Jane Smith (Trainer), John Doe (Trainee)' : ''}"></div>
                <div class="form-group"><label>Incident Description</label><textarea class="form-control" rows="3"></textarea></div>
                <div class="form-group"><label>Photo Attachments</label><input type="file" class="form-control" multiple></div>
                <button class="btn">Submit Incident Report</button>
            </div>
            
            <div class="card">
                <div class="card-header"><h3>Incident History (${RBAC_MATRIX.data_scopes[currentRole]})</h3></div>
                <table>
                    <tr><th>Date</th><th>Location</th><th>Asset ID</th><th>Description</th><th>Status</th></tr>
                    ${adminView}
                    <tr><td>07/01/2026</td><td>Chicago Yard</td><td>FL-011</td><td>Minor scratch on bumper.</td><td><span class="badge success">Resolved</span></td></tr>
                </table>
            </div>
        `;
    }

    function renderWizardScreen(container) {
        const modules = [
            { id: 1, title: "Student Details / Forms", content: "Basic student details and form reviews." },
            { id: 2, title: "Attendance", content: "<p><span class='badge success'>Geofence Validated: Trainee at Location</span></p><br><button class='btn'>Mark Present</button> <button class='btn btn-outline'>Mark Absentee</button><br><br><input type='text' class='form-control' placeholder='Add attendance feedback/notes...'>" },
            { id: 3, title: "Guide / Module Covered", content: "<div class='form-group'><label>Enter Date Covered</label><input type='date' class='form-control'></div><div class='form-group'><label>Link Specific Asset ID</label><input type='text' class='form-control' placeholder='e.g. TR-4012'></div>" },
            { id: 4, title: "3 Training Records", content: "<div class='grid-2'><div class='form-group'><label>Hours Covered</label><input type='number' class='form-control'></div></div>" },
            { id: 5, title: "Test", content: "<div class='form-group'><label>Mark Scores (Attempt 1 of 3)</label><input type='number' class='form-control' max='100'></div><div class='form-group'><label>Textual Feedback for Trainee Review</label><textarea class='form-control'></textarea></div>" },
            { id: 6, title: "Evaluation Reports & BTW Sign-off", content: "<div class='form-group'><label>Environmental Tracking</label><input type='text' class='form-control' placeholder='Weather Conditions & Traffic Levels'></div><h4>Sign-on-Glass immediately after physical eval</h4><div class='grid-2' style='margin-top:10px;'><div class='signature-pad'>Trainee</div><div class='signature-pad'>Trainer</div></div>" }
        ];

        const step = modules[currentWizardStep - 1];

        container.innerHTML = `
            <div class="card">
                <div class="card-header">
                    <span style="color: var(--coca-cola-red); font-weight:600; font-size:0.85rem;">Wizard Step ${step.id} of 6</span>
                    <h3>${step.title}</h3>
                </div>
                <div style="background: #F8FAFC; border: 1px dashed var(--border-light); border-radius: 8px; padding: 40px; text-align: center;">
                    ${step.content}
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:20px;">
                    <button class="btn btn-outline" onclick="changeWizardStep(-1)" ${currentWizardStep === 1 ? 'disabled' : ''}>← Back</button>
                    <button class="btn" onclick="changeWizardStep(1)">${currentWizardStep === 6 ? 'Finalize License Result' : 'Next Step →'}</button>
                </div>
            </div>
        `;
    }

    function changeWizardStep(dir) {
        const next = currentWizardStep + dir;
        if(next >= 1 && next <= 6) { currentWizardStep = next; renderWizardScreen(document.getElementById('app-body')); }
        else if(next > 6) { navigate('trainees'); }
    }

    function renderAdminScreen(container) {
        container.innerHTML = `
            <div class="card">
