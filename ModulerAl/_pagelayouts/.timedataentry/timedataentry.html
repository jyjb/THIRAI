<style>
    .dataEntryForm {
        font-family: Arial, sans-serif;
        margin: 0;
        display: flex;
        height: 100%;
        width: 100%;
        background-color: #f5f5f5;
    }

    .sidebar {
        width: 25%;
        background-color: #2c3e50;
        color: white;
        padding: 20px;
        box-sizing: border-box;
        overflow-y: auto;
    }

    .sidebar h2 {
        text-align: center;
    }

    .json-item {
        padding: 10px;
        margin: 5px 0;
        background-color: #34495e;
        cursor: pointer;
        border-radius: 4px;
        transition: background-color 0.2s;
    }

    .json-item:hover {
        background-color: #1abc9c;
    }

    .main {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        position: relative;
    }

    h3 {
        margin-top: 0;
    }

    form {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
    }

    input,
    textarea,
    select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        box-sizing: border-box;
        border-radius: 4px;
        border: 1px solid #ccc;
    }

    button {
        margin-top: 20px;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    #saveBtn {
        background-color: #2ecc71;
        color: white;
    }

    #clearBtn {
        background-color: #e74c3c;
        color: white;
        margin-left: 10px;
    }

    #savedDataPanel {
        position: fixed;
        top: 0;
        right: -300px;
        width: 300px;
        height: 100%;
        background-color: #2980b9;
        color: white;
        padding: 20px;
        box-sizing: border-box;
        overflow-y: auto;
        border-radius: 0 10px 10px 0;
        box-shadow: -4px 0 10px rgba(0, 0, 0, 0.1);
        transition: right 0.3s ease;
    }

    #savedDataPanel h4 {
        margin-top: 0;
    }

    #savedDataText {
        white-space: pre-wrap;
        word-wrap: break-word;
    }

    #closePanelBtn {
        background-color: #e74c3c;
        color: white;
        padding: 8px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 10px;
    }
</style>
<section class="dataEntryForm">
    <div class="sidebar">
        <h2>Job Queue</h2>
        <div id="jsonList"></div>
    </div>

    <div class="main">
        <h3 id="formTitle">Time Entry Form</h3>
        <div id="formContainer"></div>
    </div>
    <div id="savedDataPanel">
        <h4>Saved Data</h4>
        <pre id="savedDataText"></pre>
        <button id="closePanelBtn" onclick="closePanel()">Close</button>
    </div>
</section>
<script>
    (() => {
        const formDefinition = {
            fields: [
                { label: "Client Name", type: "text", id: "clientName" },
                { label: "Process Name", type: "text", id: "processName" },
                { label: "SubProcess Name", type: "text", id: "subProcessName" },
                { label: "Activity Name", type: "text", id: "activityName" },
                { label: "Date", type: "date", id: "date" },
                { label: "Start Time", type: "time", id: "startTime" },
                { label: "End Time", type: "time", id: "endTime" },
                { label: "Billing Model", type: "text", id: "billingModel", readonly: true },
                { label: "Rate Card", type: "text", id: "rateCard", readonly: true },
                { label: "Total Hours Spent", type: "text", id: "totalHours", readonly: true },
                { label: "Total Billable", type: "text", id: "totalBillable", readonly: true }
            ]
        };

        const jsonList = document.getElementById('jsonList');
        const formContainer = document.getElementById('formContainer');
        const formTitle = document.getElementById('formTitle');
        const savedDataText = document.getElementById('savedDataText');
        const savedDataPanel = document.getElementById('savedDataPanel');
        function loadForm() {
            formTitle.textContent = "Time Entry Form";
            formContainer.innerHTML = '';

            const form = document.createElement('form');
            formDefinition.fields.forEach(field => {
                const label = document.createElement('label');
                label.textContent = field.label;
                label.setAttribute('for', field.id);

                let input;
                if (field.type === 'textarea') {
                    input = document.createElement('textarea');
                } else {
                    input = document.createElement('input');
                    input.type = field.type;
                    input.id = field.id;
                    input.name = field.id;

                    if (field.readonly) {
                        input.setAttribute('readonly', true);
                    }
                }
                form.appendChild(label);
                form.appendChild(input);
            });
            const saveBtn = document.createElement('button');
            saveBtn.type = 'button';
            saveBtn.id = 'saveBtn';
            saveBtn.textContent = 'Save';
            saveBtn.onclick = () => saveForm();

            const clearBtn = document.createElement('button');
            clearBtn.type = 'button';
            clearBtn.id = 'clearBtn';
            clearBtn.textContent = 'Clear';
            clearBtn.onclick = () => clearForm();

            form.appendChild(saveBtn);
            form.appendChild(clearBtn);
            formContainer.appendChild(form);
            document.getElementById('startTime').addEventListener('change', calculateTotalHours);
            document.getElementById('endTime').addEventListener('change', calculateTotalHours);
            document.getElementById('clientName').addEventListener('input', updateBillingModel);
            document.getElementById('rateCard').value = "$45 per hour";
            updateBillingModel();
        }
        function updateBillingModel() {
            const clientName = document.getElementById('clientName').value;
            if (clientName === "MS") {
                document.getElementById('billingModel').value = "Hourly Billing";
            }
        }
        function calculateTotalHours() {
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;

            if (startTime && endTime) {
                const start = new Date(`1970-01-01T${startTime}:00`);
                const end = new Date(`1970-01-01T${endTime}:00`);
                const hoursSpent = (end - start) / 3600000;
                document.getElementById('totalHours').value = `${hoursSpent.toFixed(2)} hours`;
                calculateTotalBillable(hoursSpent);
            }
        }
        function calculateTotalBillable(hours) {
            const rate = 45;
            const totalBillable = rate * hours;
            document.getElementById('totalBillable').value = `$${totalBillable.toFixed(2)}`;
        }
        function saveForm() {
            const data = {};
            formDefinition.fields.forEach(field => {
                data[field.id] = document.getElementById(field.id).value;
            });
            const jsonFileName = `time_entry_${new Date().getTime()}.json`;
            const jsonData = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonData], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = jsonFileName;
            link.click();
            const fileItem = document.createElement('div');
            fileItem.className = 'json-item';
            fileItem.textContent = jsonFileName;
            fileItem.onclick = () => loadSavedData(jsonFileName, jsonData);
            jsonList.appendChild(fileItem);
            savedDataText.textContent = jsonData;
            savedDataPanel.style.right = '0';
        }
        function loadSavedData(fileName, jsonData) {
            const data = JSON.parse(jsonData);
            formDefinition.fields.forEach(field => {
                if (data[field.id]) {
                    document.getElementById(field.id).value = data[field.id];
                }
            });
        }

        function clearForm() {
            formDefinition.fields.forEach(field => {
                if (field.id !== 'rateCard') { document.getElementById(field.id).value = ''; }
            });
        }
        loadForm();
    })();
    function closePanel() {
        savedDataPanel.style.right = '-300px';
    }
</script>
