<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="_servertools\.serveradmin\admin.css">
    <title>Server Config Manager</title>
</head>

<body>

    <div class="admin-layout">
        <aside class="sidebar">
            <h2>Wrapper Admin</h2>
            <nav>
                <a href="#general" class="active">Global Settings</a>
                <a href="#logging">Logging</a>
                <a href="#tasks">API Tasks</a>
            </nav>
            <div class="sidebar-footer">
                <button type="button" class="btn btn-secondary" onclick="toggleJSON()">View Raw JSON</button>
            </div>
        </aside>

        <main class="content">
            <form id="configForm">
                <section id="general" class="card">
                    <h3>Global Configuration</h3>
                    <div class="grid">
                        <div class="form-group">
                            <label>Network Port</label>
                            <input type="number" id="port" value="5000">
                        </div>
                        <div class="form-group">
                            <label>Static Root</label>
                            <input type="text" id="staticRoot" value="{CURRENT}">
                        </div>
                        <div class="form-group">
                            <label>Plugin Root</label>
                            <input type="text" id="pluginroot" value="_servertools/.plugins">
                        </div>
                        <div class="form-group">
                            <label>Data Root</label>
                            <input type="text" id="dataroot" value="_data">
                        </div>
                    </div>
                    <div class="checkbox-row" style="margin-top: 20px;">
                        <label class="toggle">
                            <input type="checkbox" id="autoOpenBrowser" checked>
                            <span class="slider"></span>
                            <span class="label-text">Auto Open Browser</span>
                        </label>
                    </div>
                </section>

                <section id="logging" class="card">
                    <h3>Logging & Events</h3>
                    <div class="grid">
                        <div class="form-group">
                            <label>Log Type</label>
                            <select id="logType">
                                <option value="all">All</option>
                                <option value="errors">Errors Only</option>
                            </select>
                        </div>
                        <div class="form-group checkbox-row" style="margin-top: 25px;">
                            <label class="toggle">
                                <input type="checkbox" id="logConsole" checked>
                                <span class="slider"></span>
                                <span class="label-text">Console Output</span>
                            </label>
                        </div>
                    </div>
                    <div class="event-chips">
                        <label><input type="checkbox" id="ev-apicalls" class="checkBoxOnly" checked> API Calls</label>
                        <label><input type="checkbox" id="ev-hash" class="checkBoxOnly" checked> Hash Change</label>
                        <label><input type="checkbox" id="ev-url" class="checkBoxOnly" checked> URL Change</label>
                    </div>
                </section>

                <section id="tasks" class="card">
                    <div class="section-header">
                        <h3>API Tasks</h3>
                        <button type="button" class="btn btn-add" onclick="addTask()">+ New Task</button>
                    </div>
                    <div id="taskList">
                    </div>
                </section>

                <div class="bottom-bar">
                    <button type="submit" class="btn btn-save" onclick="">Save Changes</button>
                </div>
            </form>

            <div id="jsonModal" class="modal">
                <div class="modal-content">
                    <span class="close" onclick="toggleJSON()">&times;</span>
                    <h3>Config Export</h3>
                    <pre id="jsonPreview"></pre>
                </div>
            </div>
        </main>
    </div>

    <script src="_servertools\.serveradmin\admin.js"></script>
</body>

</html>
